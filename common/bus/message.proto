message portCh{
  int32 baud=1;
  int32 data=2;
  int32 stop=3;
  int32 parity=4;
  int32 flow=5;
}
message IoConfig{
  string dev=1;//设备 ip
  portCh ch=2;//通道
  string own_dev=3; //自己
  string own_ch=4;
}